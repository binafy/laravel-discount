name: "Run Tests"

on: [push, pull_request]

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php: ['8.1', '8.2', '8.3', '8.4', '8.5']
                laravel: ['9.*', '10.*', '11.*', '12.*', '13.*']
                dependency-version: [prefer-lowest, prefer-stable]
                include:
                    - laravel: 13.*
                      testbench: 11.*
                      pest-plugin-laravel: '^4.0'

                    - laravel: 12.*
                      testbench: 10.*
                      pest-plugin-laravel: '^3.1'

                    - laravel: 11.*
                      testbench: 9.*
                      pest-plugin-laravel: '^2.3'

                    - laravel: 10.*
                      testbench: 8.*
                      pest-plugin-laravel: '^2.0'

                    - laravel: 9.*
                      testbench: 7.*
                      pest-plugin-laravel: '^1.4'

                exclude:
                    - laravel: 13.*
                      php: '8.1'

                    - laravel: 13.*
                      php: '8.2'

                    - laravel: 12.*
                      php: '8.1'

                    - laravel: 11.*
                      php: '8.1'

                    - laravel: 11.*
                      php: '8.5'

                    - laravel: 10.*
                      php: '8.4'

                    - laravel: 10.*
                      php: '8.5'

                    - laravel: 9.*
                      php: '8.3'

                    - laravel: 9.*
                      php: '8.4'

                    - laravel: 9.*
                      php: '8.5'

        name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.dependency-version }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  extensions: curl, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, iconv
                  coverage: none

            - name: Install dependencies
              run: |
                  composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "pestphp/pest-plugin-laravel:${{ matrix.pest-plugin-laravel }}" --no-interaction --no-update
                  composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction
            - name: Execute tests
              run: vendor/bin/pest

